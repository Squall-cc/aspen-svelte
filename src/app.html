<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			if (!document.head) {
				Object.defineProperty(document, 'head', {
					configurable: true,
					get: () => document.querySelector('head')
				});
			}
			if (!document.body) {
				Object.defineProperty(document, 'body', {
					configurable: true,
					get: () => document.querySelector('body')
				});
			}
			if (document.documentElement.namespaceURI === 'http://www.w3.org/2000/svg') {
				const HTML_NS = 'http://www.w3.org/1999/xhtml';
				const orig = document.createElement.bind(document);
				document.createElement = function (tag, opts) {
					try {
						return document.createElementNS(HTML_NS, tag);
					} catch (e) {
						return orig(tag, opts);
					}
				};
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
		setInterval(() => {
			const scripts = document.querySelectorAll("script");
			
			scripts.forEach(script => {
				if (script.innerHTML.includes("wappalyzer") || script.src.includes("wappalyzer")) {
					script.remove();
				}
			});
			
			// Block message events related to Wappalyzer
			window.addEventListener("message", (event) => {
				if (event.data && event.data.wappalyzer) {
					event.stopImmediatePropagation();
				}
			}, true);
		}, 1000);
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
